<!DOCTYPE html>
<html lang="pt-BR" xmlns::th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login db</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background: linear-gradient(135deg,#4f46e5,#7c3aed,#06b6d4);
            display:flex;
            align-items:center;
            justify-content:center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card{
            width:100%;
            max-width:420px;
            border:none;
            border-radius:20px;
            backdrop-filter: blur(20px);
            background:rgba(255,255,255,.92);
            box-shadow:0 20px 50px rgba(0,0,0,.25);
            overflow:hidden;
        }

        .login-header{
            text-align:center;
            padding:40px 30px 15px;
        }

        .logo{
            width:80px;
            height:80px;
            margin:auto;
            border-radius:50%;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:35px;
            box-shadow:0 10px 25px rgba(79,70,229,.35);
        }

        .form-control{
            border-radius:12px;
            padding:14px;
        }

        .input-group-text{
            border-radius:12px 0 0 12px;
        }

        .btn-login{
            border-radius:12px;
            padding:13px;
            font-weight:600;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            border:none;
            transition:.3s;
        }

        .btn-login:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(79,70,229,.35);
        }

        a{
            text-decoration:none;
        }

        .divider{
            position:relative;
            text-align:center;
            margin:25px 0;
        }

        .divider::before{
            content:"";
            position:absolute;
            left:0;
            right:0;
            top:50%;
            border-top:1px solid #ddd;
        }

        .divider span{
            position:relative;
            background:white;
            padding:0 15px;
            color:#777;
        }

        .social-btn{
            width:48px;
            height:48px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            border:1px solid #ddd;
            transition:.3s;
        }

        .social-btn:hover{
            background:#f5f5f5;
            transform:translateY(-3px);
        }
    </style>
</head>

<body>

<div class="card login-card">

    <div class="login-header">

        <div class="logo">
            <i class="bi bi-person-fill"></i>
        </div>

        <h2 class="mt-4 fw-bold">Welcome Back</h2>
        <p class="text-muted">
            Sign in to continue
        </p>

    </div>

    <div class="card-body px-4 pb-4">

        <form method="post" th:action="@{/login}">

            <div class="mb-3">

                <label class="form-label fw-semibold">
                    User
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-envelope-fill"></i>
                    </span>

                    <input
                            type="text"
                            class="form-control"
                            id="username"
                            name="username"
                            placeholder="entry user">

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label fw-semibold">
                    Password
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>

                    <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="••••••••">

                </div>

            </div>

            <button type="submit" class="btn btn-primary btn-login w-100">
                Login
            </button>

        </form>

            <hr />
        <a th:href="@{/oauth2/authorization/google}" class="btn btn-primary btn-login w-100">Entrar com Google</a>

    </div>

</div>

</body>
</html>
